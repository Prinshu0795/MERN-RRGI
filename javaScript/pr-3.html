<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function sum(){
            const n1=document.getElementById("id").value
             const n2=document.getElementById("id-1").value
             document.getElementById("result").innerHTML=parseInt(n1)+parseInt(n2)
        }

        function sub(){
            const n1=document.getElementById("id-2").value
             const n2=document.getElementById("id-3").value
             document.getElementById("res").innerHTML=parseInt(n1)-parseInt(n2)

        }
    </script>
</head>
<body>
    <input  type="number" id="id">
    <input  type="number" id="id-1">
    <button onclick="sum()">Sum</button>
    <p id="result"></p>
    <br>
    <hr>

    <input  type="number" id="id-2">
    <input  type="number" id="id-3">
    <button onclick="sub()">Substraction</button>
    <p id="res"></p>


</body>
</html>
